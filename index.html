<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS Box - Conecta Varejo</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyCmbM5EmPunEHTUZYsnNtPJykUMvcQ3Yls",
authDomain: "bs-box-pedidos.firebaseapp.com",
projectId: "bs-box-pedidos",
storageBucket: "bs-box-pedidos.firebasestorage.app",
messagingSenderId: "889764433720",
appId: "1:889764433720:web:3e8df9469aa1d32773bbcd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
header{background:white;padding:10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #ddd;}
header img{height:45px;}

.container{display:flex;height:calc(100vh - 70px);}
.catalogo{flex:2;overflow:auto;padding:10px;}
.pedido{flex:1;background:white;border-left:1px solid #ddd;padding:10px;display:flex;flex-direction:column;}

.pedidoItens{flex:1;overflow:auto;font-size:14px;margin-bottom:10px;}
textarea{width:100%;min-height:60px;}

.card{background:white;border-radius:8px;padding:10px;margin:6px 0;display:flex;justify-content:space-between;}

.qty{display:flex;flex-direction:column;}
.qty input{width:60px;}

button{padding:7px;border:none;border-radius:6px;background:#222;color:white;margin:3px;cursor:pointer;}

.botoes{display:flex;gap:5px;}
.total{font-weight:bold;font-size:17px;}

#lista{margin-top:20px;}

@media(max-width:900px){
.container{flex-direction:column;}
.catalogo{padding-bottom:220px;}
.pedido{
position:fixed;
bottom:0;
left:0;
right:0;
height:200px;
z-index:999;
background:white;
border-top:2px solid #ddd;
}
}
</style>
</head>

<body>

<header>
<img src="logo_conecta.png">
<div><b>Conecta Varejo</b><br>Sistema de Pedidos</div>
</header>

<div class="container">

<div class="catalogo">
<h2>Catálogo</h2>

<button onclick="carregarCatalogo()">Atualizar catálogo</button>

<br><br>

<input id="cliente" placeholder="Razão social" oninput="buscarClientes()">
<div id="listaClientes" style="background:white;border:1px solid #ccc;"></div>

<br>

<input id="nomeFantasia" placeholder="Nome fantasia"><br><br>

<input id="cnpj" placeholder="CNPJ">
<button onclick="buscarCNPJ()">Buscar CNPJ</button>

<br><br>

<input id="endereco" placeholder="Endereço"><br><br>
<input id="ie" placeholder="Inscrição Estadual"><br><br>
<input id="contato" placeholder="Contato"><br><br>
<input id="telefone" placeholder="Telefone"><br><br>

<button onclick="salvarClienteFirebase()">Salvar Cliente</button>

<br><br>

<input id="busca" placeholder="Buscar produto" oninput="render()">

<br><br>

<select id="filtroCategoria" onchange="render()"></select>
<select id="filtroFornecedor" onchange="render()"></select>

<h3>Produtos</h3>
<div id="lista"></div>
</div>

<div class="pedido">
<h3 id="pedidoNumero"></h3>
<div id="pedido" class="pedidoItens"></div>
<div id="totalPedido"></div>
<textarea id="observacao"></textarea>

<div class="botoes">
<button onclick="novoPedido()">Novo</button>
<button onclick="salvarPedidoFirebase()">Salvar</button>
</div>
</div>

</div>

<script>

let produtos=[]
let pedido={}
let numeroPedido=gerarNumeroPedido()
let clienteSelecionado=null

document.getElementById("pedidoNumero").innerText="Pedido "+numeroPedido

function gerarNumeroPedido(){
let d=new Date()
return d.getFullYear()+("0"+(d.getMonth()+1)).slice(-2)+("0"+d.getDate()).slice(-2)+"-"+("0"+d.getHours()).slice(-2)+("0"+d.getMinutes()).slice(-2)
}

function normalizar(t){
return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
}

function carregarCatalogo(){
fetch("base_de_produtos.xlsx?"+Date.now())
.then(r=>r.arrayBuffer())
.then(data=>{
const wb=XLSX.read(data,{type:'array'})
const sheet=wb.Sheets[wb.SheetNames[0]]
const json=XLSX.utils.sheet_to_json(sheet,{header:1})

produtos=[]
json.slice(1).forEach(l=>{
if(!l[0]) return
produtos.push({
codigo:String(l[0]),
descricao:l[2],
fornecedor:l[3],
valorUnit:parseFloat(l[4])||0,
pedidoMin:parseInt(l[6])||1
})
})

render()
})
}

/* BUSCAR CLIENTES */
async function buscarClientes(){

let termo=document.getElementById("cliente").value.toLowerCase()

if(termo.length<2){
document.getElementById("listaClientes").innerHTML=""
return
}

let snapshot=await db.collection("clientes").get()
let lista=document.getElementById("listaClientes")
lista.innerHTML=""

snapshot.forEach(doc=>{
let c=doc.data()

if(
(c.nome||"").toLowerCase().includes(termo) ||
(c.nomeFantasia||"").toLowerCase().includes(termo) ||
(c.cnpj||"").includes(termo) ||
(c.telefone||"").includes(termo)
){
let div=document.createElement("div")
div.style.padding="8px"
div.style.cursor="pointer"

div.innerHTML=`<b>${c.nome}</b><br><small>${c.nomeFantasia||""}</small>`

div.onclick=()=>selecionarCliente(doc.id,c)

lista.appendChild(div)
}
})
}

/* SELECIONAR */
function selecionarCliente(id,c){
clienteSelecionado=id

document.getElementById("cliente").value=c.nome||""
document.getElementById("nomeFantasia").value=c.nomeFantasia||""
document.getElementById("cnpj").value=c.cnpj||""
document.getElementById("endereco").value=c.endereco||""
document.getElementById("ie").value=c.inscricaoEstadual||""
document.getElementById("contato").value=c.contato||""
document.getElementById("telefone").value=c.telefone||""

document.getElementById("listaClientes").innerHTML=""
}

/* SALVAR CLIENTE */
function salvarClienteFirebase(){

let clienteObj={
nome:document.getElementById("cliente").value,
nomeFantasia:document.getElementById("nomeFantasia").value,
cnpj:document.getElementById("cnpj").value.replace(/\D/g,''),
endereco:document.getElementById("endereco").value,
inscricaoEstadual:document.getElementById("ie").value,
contato:document.getElementById("contato").value,
telefone:document.getElementById("telefone").value,
dataCadastro:new Date()
}

if(!clienteObj.nome){
alert("Nome obrigatório")
return
}

db.collection("clientes").add(clienteObj)
.then(()=>alert("Cliente salvo 🚀"))
.catch(()=>alert("Erro ao salvar"))
}

/* PEDIDO */
function salvarPedidoFirebase(){
let dados={
cliente:document.getElementById("cliente").value,
clienteId:clienteSelecionado,
numero:numeroPedido,
data:new Date(),
itens:Object.values(pedido),
total:Object.values(pedido).reduce((t,p)=>t+(p.qtd*p.valor),0)
}

db.collection("pedidos").add(dados)
.then(()=>alert("Pedido salvo 🚀"))
}

/* PRODUTOS */
function render(){
let lista=document.getElementById("lista")
lista.innerHTML=""

produtos.forEach(p=>{
let div=document.createElement("div")
div.className="card"

div.innerHTML=`
<div>
<b>${p.descricao}</b><br>
R$ ${p.valorUnit.toFixed(2)}
</div>
<div>
<input type="number" id="q_${p.codigo}" placeholder="Qtd">
<button onclick="addItem('${p.codigo}')">Add</button>
</div>
`

lista.appendChild(div)
})

renderPedido()
}

function addItem(c){
let q=parseInt(document.getElementById("q_"+c).value)
let prod=produtos.find(p=>p.codigo==c)

if(!q || q<prod.pedidoMin){
alert("Pedido mínimo "+prod.pedidoMin)
return
}

pedido[c]={codigo:c,produto:prod.descricao,qtd:q,valor:prod.valorUnit}
render()
}

function renderPedido(){
let box=document.getElementById("pedido")
box.innerHTML=""
let total=0

Object.values(pedido).forEach(p=>{
let st=p.qtd*p.valor
total+=st

box.innerHTML+=`${p.produto} - ${p.qtd}x R$ ${st.toFixed(2)}<br>`
})

document.getElementById("totalPedido").innerText="Total R$ "+total.toFixed(2)
}

function novoPedido(){
pedido={}
numeroPedido=gerarNumeroPedido()
document.getElementById("pedidoNumero").innerText="Pedido "+numeroPedido
render()
}

carregarCatalogo()

</script>
</body>
</html>
