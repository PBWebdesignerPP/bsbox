<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS Box - Conecta Varejo</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "bs-box-pedidos.firebaseapp.com",
projectId: "bs-box-pedidos"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
header{background:white;padding:10px;display:flex;gap:10px;border-bottom:1px solid #ddd;}
.container{display:flex;height:calc(100vh - 60px);}
.catalogo{flex:2;overflow:auto;padding:10px;}
.pedido{flex:1;background:white;border-left:1px solid #ddd;padding:10px;display:flex;flex-direction:column;}
.pedidoItens{flex:1;overflow:auto;font-size:14px;}
.card{background:white;border-radius:8px;padding:10px;margin:6px 0;display:flex;justify-content:space-between;}
.qty input{width:60px;text-align:center;}
button{padding:7px;border:none;border-radius:6px;background:#222;color:white;margin:3px;cursor:pointer;}
@media(max-width:900px){
.container{flex-direction:column;}
.catalogo{padding-bottom:240px;}
.pedido{position:fixed;bottom:0;height:220px;width:100%;}
}
</style>
</head>

<body>

<header>
<b>Conecta Varejo</b>
</header>

<div class="container">

<div class="catalogo">

<input id="cliente" placeholder="Cliente" oninput="buscarClientes()">
<div id="listaClientes"></div>

<input id="busca" placeholder="Buscar produto" oninput="render()">

<select id="filtroCategoria" onchange="render()"></select>
<select id="filtroFornecedor" onchange="render()"></select>

<div id="lista"></div>

</div>

<div class="pedido">

<h3 id="pedidoNumero"></h3>

<div id="pedido" class="pedidoItens"></div>

<div id="totalPedido"></div>

<button onclick="gerarPDF()">PDF</button>
<button onclick="salvarPedidoFirebase()">Salvar</button>

</div>

</div>

<script>

let produtos=[]
let pedido={}
let numeroPedido=Date.now()
let clienteSelecionado=null

document.getElementById("pedidoNumero").innerText="Pedido "+numeroPedido

function normalizar(t){
return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
}

function carregarCatalogo(){
fetch("base_de_produtos.xlsx")
.then(r=>r.arrayBuffer())
.then(data=>{
const wb=XLSX.read(data,{type:'array'})
const sheet=wb.Sheets[wb.SheetNames[0]]
const json=XLSX.utils.sheet_to_json(sheet,{header:1})

produtos=[]
json.slice(1).forEach(l=>{
produtos.push({
codigo:l[0],
categoria:l[1],
descricao:l[2],
fornecedor:l[3],
valorUnit:l[4],
pedidoMin:l[6]||1
})
})

popularFiltros()
render()
})
}

function popularFiltros(){
let cat=document.getElementById("filtroCategoria")
let forn=document.getElementById("filtroFornecedor")

let categorias=[...new Set(produtos.map(p=>p.categoria))]
let fornecedores=[...new Set(produtos.map(p=>p.fornecedor))]

cat.innerHTML='<option value="">Todas</option>'
forn.innerHTML='<option value="">Todos</option>'

categorias.forEach(c=>cat.innerHTML+=`<option>${c}</option>`)
fornecedores.forEach(f=>forn.innerHTML+=`<option>${f}</option>`)
}

function render(){

let busca=normalizar(document.getElementById("busca").value)
let categoria=document.getElementById("filtroCategoria").value
let fornecedor=document.getElementById("filtroFornecedor").value

let lista=document.getElementById("lista")
lista.innerHTML=""

produtos.filter(p=>{
return normalizar(p.descricao).includes(busca)
&& (!categoria || p.categoria==categoria)
&& (!fornecedor || p.fornecedor==fornecedor)
}).forEach(p=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`
<div>
<b>${p.descricao}</b><br>
R$ ${p.valorUnit}<br>
Min: ${p.pedidoMin}
</div>
<div class="qty">
<input type="number" id="q_${p.codigo}">
<button onclick="addItem('${p.codigo}')">Add</button>
</div>`

lista.appendChild(div)
})

renderPedido()
}

function addItem(c){
let q=parseInt(document.getElementById("q_"+c).value)
let prod=produtos.find(p=>p.codigo==c)

if(!q || q<prod.pedidoMin){
alert("Pedido mínimo "+prod.pedidoMin)
return
}

pedido[c]={...prod,qtd:q}
render()
}

function renderPedido(){
let box=document.getElementById("pedido")
box.innerHTML=""
let total=0

Object.values(pedido).forEach(p=>{
let st=p.qtd*p.valorUnit
total+=st

box.innerHTML+=`
${p.descricao} - ${p.qtd}x 
<input value="${p.valorUnit}" onchange="alterarValor('${p.codigo}',this.value)">
= ${st.toFixed(2)}
<button onclick="removerItem('${p.codigo}')">X</button><br>`
})

document.getElementById("totalPedido").innerText="Total "+total.toFixed(2)
}

function alterarValor(c,v){
pedido[c].valorUnit=parseFloat(v)
renderPedido()
}

function removerItem(c){
delete pedido[c]
render()
}

/* CLIENTES */
async function buscarClientes(){

let termo=normalizar(document.getElementById("cliente").value)

let snap=await db.collection("clientes").get()

let lista=document.getElementById("listaClientes")
lista.innerHTML=""

snap.forEach(doc=>{
let c=doc.data()

if(
normalizar(c.nome).includes(termo) ||
normalizar(c.nomeFantasia||"").includes(termo) ||
(c.cnpj||"").includes(termo)
){
let div=document.createElement("div")
div.innerHTML=c.nome
div.onclick=()=>{clienteSelecionado=doc.id;document.getElementById("cliente").value=c.nome}
lista.appendChild(div)
}
})
}

/* PDF */
function gerarPDF(){
html2canvas(document.body).then(canvas=>{
const img=canvas.toDataURL()
const {jsPDF}=window.jspdf
let pdf=new jsPDF()
pdf.addImage(img,'PNG',0,0)
pdf.save("pedido.pdf")
})
}

/* FIREBASE */
function salvarPedidoFirebase(){
db.collection("pedidos").add({
cliente:document.getElementById("cliente").value,
itens:Object.values(pedido),
data:new Date()
}).then(()=>alert("Salvo"))
}

carregarCatalogo()

</script>
</body>
</html>
