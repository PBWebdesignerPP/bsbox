<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS Box</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#222222">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{font-family:Arial;margin:0;padding:10px;background:#f2f2f2}
h2{margin:5px 0}

.topbar{background:white;padding:10px;border-radius:10px;margin-bottom:10px}

input,select{padding:10px;font-size:16px;width:100%;margin:4px 0}

textarea{padding:10px;font-size:16px;width:100%;margin-top:10px}

button{padding:10px;font-size:16px;border:none;border-radius:8px;background:#222;color:white;margin:4px 0;cursor:pointer}

button:hover{background:#444}

.card{background:white;border-radius:10px;padding:10px;margin:8px 0;display:flex;justify-content:space-between;align-items:center}

.prodInfo{flex:1;font-size:14px}

.qty{display:flex;align-items:center;gap:6px}

.qty button{width:32px;height:32px;font-size:18px}

.qty input{width:50px;text-align:center;font-size:16px}

#pedidoBox{background:white;padding:10px;border-radius:10px;margin-top:10px}

.total{font-size:18px;font-weight:bold;margin-top:10px}

.fornecedorBox{margin-top:10px;padding-top:5px;border-top:1px solid #ccc}

.remover{color:red;font-size:12px;cursor:pointer}

</style>
</head>

<body>

<h2>BS Box</h2>

<div class="topbar">

<button onclick="atualizarCatalogo()">Atualizar Catálogo</button>

<input type="file" id="fileInput" accept=".xlsx"/>

<input id="cliente" placeholder="Nome do cliente"/>

<input id="busca" placeholder="Buscar produto..." oninput="render()"/>

<select id="filtroCategoria" onchange="render()"><option value="">Todas categorias</option></select>

<select id="filtroFornecedor" onchange="render()"><option value="">Todos fornecedores</option></select>

</div>

<div id="lista"></div>

<div id="pedidoBox">

<h3>Pedido</h3>

<div id="pedido"></div>

<div class="total" id="totalPedido">Total: R$ 0</div>

<textarea id="observacao" placeholder="Observações do pedido (forma de pagamento, prazo, entrega, etc.)"></textarea>

<button onclick="novoPedido()">Novo Pedido</button>
<button onclick="gerarPDF()">Gerar PDF</button>
<button onclick="gerarExcel()">Gerar Excel</button>
<button onclick="enviarWhats()">Enviar WhatsApp</button>

</div>

<script>

let produtos=[]
let pedido={}

function normalizar(txt){
return txt.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
}

async function atualizarCatalogo(){

if(!confirm("Deseja atualizar o catálogo?")) return

localStorage.removeItem("bsbox_catalogo")
produtos=[]
render()

try{

const urlBase="https://raw.githubusercontent.com/PBWebdesignerPP/bsbox/main/base_de_produtos.xlsx"
const url=urlBase+"?t="+new Date().getTime()

const resp=await fetch(url,{cache:"no-store"})

if(!resp.ok) throw new Error("Erro")

const data=await resp.arrayBuffer()

processarExcel(data)

alert("Catálogo atualizado")

}

catch(e){

alert("Erro ao atualizar catálogo")

carregarCatalogoLocal()

}

}

document.getElementById("fileInput").addEventListener("change",function(e){

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(evt){

processarExcel(evt.target.result)

}

reader.readAsArrayBuffer(file)

})

function processarExcel(data){

const workbook=XLSX.read(data,{type:'array'})
const sheet=workbook.Sheets[workbook.SheetNames[0]]
const json=XLSX.utils.sheet_to_json(sheet,{header:1})

produtos=[]

json.slice(1).forEach(l=>{

let codigo=l[0]

if(!codigo) return

produtos.push({

codigo:String(codigo),
categoria:l[1],
descricao:l[2],
fornecedor:l[3],
valorUnit:parseFloat(l[4])||0,
volume:parseInt(l[6])||0

})

})

salvarCatalogo()
popularFiltros()
render()

}

function salvarCatalogo(){
localStorage.setItem("bsbox_catalogo",JSON.stringify(produtos))
}

function carregarCatalogoLocal(){

let cat=localStorage.getItem("bsbox_catalogo")

if(cat){

produtos=JSON.parse(cat)

popularFiltros()
render()

}

}

function popularFiltros(){

let catSet=new Set()
let fornSet=new Set()

produtos.forEach(p=>{
catSet.add(p.categoria)
fornSet.add(p.fornecedor)
})

let cat=document.getElementById("filtroCategoria")
let forn=document.getElementById("filtroFornecedor")

cat.innerHTML='<option value="">Todas categorias</option>'
forn.innerHTML='<option value="">Todos fornecedores</option>'

catSet.forEach(c=>cat.innerHTML+=`<option>${c}</option>`)
fornSet.forEach(f=>forn.innerHTML+=`<option>${f}</option>`)

}

function render(){

let busca=normalizar(document.getElementById("busca").value)
let cat=document.getElementById("filtroCategoria").value
let forn=document.getElementById("filtroFornecedor").value

let lista=document.getElementById("lista")
lista.innerHTML=""

produtos
.filter(p=>{

let texto=normalizar(p.descricao+" "+p.codigo+" "+p.categoria+" "+p.fornecedor)

return texto.includes(busca)

})
.filter(p=>!cat||p.categoria==cat)
.filter(p=>!forn||p.fornecedor==forn)
.sort((a,b)=>a.descricao.localeCompare(b.descricao))

.forEach(p=>{

let q=pedido[p.codigo]?.qtd||0

let div=document.createElement("div")
div.className="card"

div.innerHTML=`

<div class="prodInfo">

<b>${p.descricao}</b><br>

Código: ${p.codigo}<br>
Categoria: ${p.categoria}<br>
Fornecedor: ${p.fornecedor}<br>
Volume caixa: ${p.volume} un<br>
Valor unitário: R$ ${p.valorUnit.toFixed(2)}

</div>

<div class="qty">

<button onclick="menos('${p.codigo}')">-</button>

<input type="number" min="0" value="${q}" onchange="setQtd('${p.codigo}',this.value)">

<button onclick="mais('${p.codigo}')">+</button>

</div>

`

lista.appendChild(div)

})

renderPedido()

}

function setQtd(c,q){

q=parseInt(q)

let prod=produtos.find(p=>p.codigo==c)

if(!q || q<=0){

delete pedido[c]

}

else{

pedido[c]={

produto:prod.descricao,
qtd:q,
valor:prod.valorUnit,
fornecedor:prod.fornecedor

}

}

render()

}

function mais(c){

let prod=produtos.find(p=>p.codigo==c)

if(!pedido[c]){

pedido[c]={produto:prod.descricao,qtd:1,valor:prod.valorUnit,fornecedor:prod.fornecedor}

}else{

pedido[c].qtd++

}

render()

}

function menos(c){

if(!pedido[c]) return

pedido[c].qtd--

if(pedido[c].qtd<=0) delete pedido[c]

render()

}

function renderPedido(){

let box=document.getElementById("pedido")

box.innerHTML=""

let total=0

Object.keys(pedido).forEach(c=>{

let p=pedido[c]

let sub=p.qtd*p.valor

let div=document.createElement("div")

div.innerHTML=`
${p.qtd} un - ${p.produto} - R$ ${sub.toFixed(2)}
<span class="remover" onclick="removerItem('${c}')"> ❌ remover</span>
`

box.appendChild(div)

total+=sub

})

document.getElementById("totalPedido").textContent="Total: R$ "+total.toFixed(2)

}

function removerItem(c){

delete pedido[c]

render()

}

function novoPedido(){

if(!confirm("Iniciar novo pedido?")) return

pedido={}
document.getElementById("observacao").value=""

render()

}

function gerarPDF(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

let cliente=document.getElementById("cliente").value||"SEM CLIENTE"

let y=20

doc.text("BS BOX PEDIDO",20,10)

doc.text("Cliente: "+cliente,20,y)

y+=10

Object.keys(pedido).forEach(c=>{

let p=pedido[c]

doc.text(`${p.qtd} un - ${p.produto}`,20,y)

y+=8

})

doc.save("pedido_bsbox.pdf")

}

function gerarExcel(){

let rows=[["codigo","produto","qtd"]]

Object.keys(pedido).forEach(c=>{

let p=pedido[c]

rows.push([c,p.produto,p.qtd])

})

let ws=XLSX.utils.aoa_to_sheet(rows)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"pedido")

XLSX.writeFile(wb,"pedido_bsbox.xlsx")

}

function enviarWhats(){

let cliente=document.getElementById("cliente").value||"SEM CLIENTE"

let texto=`Pedido BS BOX
Cliente: ${cliente}`

window.open("https://wa.me/?text="+encodeURIComponent(texto))

}

carregarCatalogoLocal()

</script>

</body>
</html>
