<script>

/* =========================
   🔥 FIREBASE INIT (PRIMEIRO!)
========================= */
const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "bs-box-pedidos.firebaseapp.com",
projectId: "bs-box-pedidos"
}

firebase.initializeApp(firebaseConfig)
const db = firebase.firestore()

/* =========================
   VARIAVEIS
========================= */
let produtos=[]
let pedido={}
let numeroPedido=Date.now()
let clienteSelecionado=null
let clienteNome=""
let clientesCache=[]

/* =========================
   INIT SEGURO
========================= */
document.addEventListener("DOMContentLoaded", function(){

let pedidoEl = document.getElementById("pedidoNumero")
if(pedidoEl){
pedidoEl.innerText = "Pedido " + numeroPedido
}

// 🔥 CACHE
carregarCacheLocal()
atualizarClientesFirebase()

carregarCatalogo()

document.getElementById("buscaCliente")?.addEventListener("input", buscarClientes)
document.getElementById("busca")?.addEventListener("input", render)
document.getElementById("filtroCategoria")?.addEventListener("change", render)
document.getElementById("filtroFornecedor")?.addEventListener("change", render)

})

/* =========================
   🔥 CACHE CLIENTES
========================= */

function carregarCacheLocal(){
let cacheLocal = localStorage.getItem("clientesCache")

if(cacheLocal){
clientesCache = JSON.parse(cacheLocal)
console.log("Cache carregado:", clientesCache.length)
}
}

function salvarCacheLocal(){
localStorage.setItem("clientesCache", JSON.stringify(clientesCache))
}

async function atualizarClientesFirebase(){
try{
let snap = await db.collection("clientes").get()

clientesCache = []

snap.forEach(doc=>{
clientesCache.push({
id: doc.id,
...doc.data()
})
})

salvarCacheLocal()
console.log("Clientes atualizados do Firebase")

}catch(e){
console.log("Sem internet, usando cache local")
}
}

/* =========================
   UTIL
========================= */
function normalizar(t){
return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
}

function limparNumero(t){
return (t||"").replace(/\D/g,"")
}

function matchTexto(campo, termo){
if(!campo || !termo) return false
return normalizar(campo).includes(termo)
}

/* =========================
   CATALOGO
========================= */
function carregarCatalogo(){
fetch("base_de_produtos.xlsx")
.then(r=>{
if(!r.ok){
alert("Arquivo base_de_produtos.xlsx não encontrado")
return
}
return r.arrayBuffer()
})
.then(data=>{
if(!data) return

const wb = XLSX.read(data,{type:'array'})
const sheet = wb.Sheets[wb.SheetNames[0]]
const json = XLSX.utils.sheet_to_json(sheet,{header:1})

produtos=[]
json.slice(1).forEach(l=>{
produtos.push({
codigo:l[0],
categoria:l[1],
descricao:l[2],
fornecedor:l[3],
valorUnit:l[4],
pedidoMin:l[6]||1
})
})

popularFiltros()
render()
})
}

function popularFiltros(){
let cat=document.getElementById("filtroCategoria")
let forn=document.getElementById("filtroFornecedor")

if(!cat || !forn) return

cat.innerHTML='<option value="">Todas</option>'
forn.innerHTML='<option value="">Todos</option>'

;[...new Set(produtos.map(p=>p.categoria))].forEach(c=>cat.innerHTML+=`<option>${c}</option>`)
;[...new Set(produtos.map(p=>p.fornecedor))].forEach(f=>forn.innerHTML+=`<option>${f}</option>`)
}

function render(){

let busca=normalizar(document.getElementById("busca")?.value)
let categoria=document.getElementById("filtroCategoria")?.value
let fornecedor=document.getElementById("filtroFornecedor")?.value

let lista=document.getElementById("lista")
if(!lista) return

lista.innerHTML=""

produtos.filter(p=>{
return normalizar(p.descricao).includes(busca)
&& (!categoria || p.categoria==categoria)
&& (!fornecedor || p.fornecedor==fornecedor)
}).forEach(p=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`
<div>
<b>${p.descricao}</b><br>
R$ ${p.valorUnit}<br>
Min: ${p.pedidoMin}
</div>
<div class="qty">
<input type="number" id="q_${p.codigo}">
<button onclick="addItem('${p.codigo}')">Add</button>
</div>`

lista.appendChild(div)
})

renderPedido()
}

/* =========================
   PEDIDO
========================= */
function addItem(c){
let q=parseInt(document.getElementById("q_"+c)?.value)
let prod=produtos.find(p=>p.codigo==c)

if(!q || q<prod.pedidoMin){
alert("Pedido mínimo "+prod.pedidoMin)
return
}

pedido[c]={...prod,qtd:q}
render()
}

function renderPedido(){
let box=document.getElementById("pedido")
if(!box) return

box.innerHTML=""
let total=0

Object.values(pedido).forEach(p=>{
let st=p.qtd*p.valorUnit
total+=st

box.innerHTML+=`
${p.descricao} - ${p.qtd}x 
<input value="${p.valorUnit}" onchange="alterarValor('${p.codigo}',this.value)">
= ${st.toFixed(2)}
<button onclick="removerItem('${p.codigo}')">X</button><br>`
})

let totalEl = document.getElementById("totalPedido")
if(totalEl){
totalEl.innerText="Total "+total.toFixed(2)
}
}

function alterarValor(c,v){
pedido[c].valorUnit=parseFloat(v)
renderPedido()
}

function removerItem(c){
delete pedido[c]
render()
}

/* =========================
   CLIENTES
========================= */
function buscarClientes(){

let texto = document.getElementById("buscaCliente")?.value

if(!texto || texto.length < 2){
document.getElementById("listaClientes").innerHTML=""
return
}

let termo = normalizar(texto)
let termoNumero = limparNumero(texto)

let lista = document.getElementById("listaClientes")
lista.innerHTML=""

clientesCache.forEach(c=>{

let match =
matchTexto(c.nome, termo) ||
matchTexto(c.nomeFantasia, termo) ||
matchTexto(c.cidade, termo) ||
matchTexto(c.bairro, termo) ||
matchTexto(c.rua, termo) ||
matchTexto(c.nomeContato, termo) ||
matchTexto(c.telefone, termo)

if(termoNumero){
match = match || limparNumero(c.cnpj).includes(termoNumero)
}

if(match){

let div=document.createElement("div")
div.innerHTML = `<b>${c.nome}</b><br><small>${c.nomeFantasia}</small>`

div.onclick = ()=>{
clienteSelecionado = c.id
clienteNome = c.nome

document.getElementById("buscaCliente").value = c.nome
lista.innerHTML=""

let box = document.getElementById("clienteSelecionadoBox")
box.style.display="block"
box.innerHTML=`Cliente selecionado:<br><b>${c.nome}</b>`
}

lista.appendChild(div)
}
})
}

/* =========================
   CLIENTE
========================= */
function salvarCliente(){

let cliente = {
nome: nome.value,
nomeFantasia: nomeFantasia.value,
cnpj: cnpj.value,
inscricaoEstadual: inscricaoEstadual.value,
cep: cep.value,
cidade: cidade.value,
bairro: bairro.value,
rua: rua.value,
numero: numero.value,
endereco: `${rua.value}, ${numero.value} - ${bairro.value} - ${cidade.value}`,
nomeContato: nomeContato.value,
telefone: telefone.value
}

for(let k in cliente){
if(!cliente[k]){
alert("Preencha todos os campos")
return
}
}

db.collection("clientes").add(cliente).then((docRef)=>{

cliente.id = docRef.id
clientesCache.push(cliente)
salvarCacheLocal()

alert("Cliente salvo com sucesso")
})
}

/* =========================
   CNPJ
========================= */
async function buscarCNPJ(){
let c = limparNumero(cnpj.value)

if(c.length!=14){
alert("CNPJ inválido")
return
}

let res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${c}`)
let d = await res.json()

nome.value = d.razao_social || ""
nomeFantasia.value = d.nome_fantasia || ""
cep.value = d.cep || ""
cidade.value = d.municipio || ""
bairro.value = d.bairro || ""
rua.value = d.logradouro || ""
}

/* =========================
   PEDIDO FIREBASE
========================= */
function salvarPedidoFirebase(){

if(!clienteSelecionado){
alert("Selecione um cliente")
return
}

db.collection("pedidos").add({
cliente: clienteNome,
clienteId: clienteSelecionado,
numero: numeroPedido,
data: new Date(),
itens:Object.values(pedido),
total: Object.values(pedido).reduce((s,p)=>s+(p.qtd*p.valorUnit),0)
}).then(()=>{
alert("Pedido salvo com sucesso")
pedido={}
render()
})
}

</script>
