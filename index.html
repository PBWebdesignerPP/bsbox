<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS Box - Conecta Varejo</title>

<link rel="icon" href="data:,">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
header{background:white;padding:10px;border-bottom:1px solid #ddd;}
.container{display:flex;height:calc(100vh - 50px);}
.catalogo{flex:2;overflow:auto;padding:10px;}
.pedido{flex:1;background:white;border-left:1px solid #ddd;padding:10px;display:flex;flex-direction:column;}
.pedidoItens{flex:1;overflow:auto;font-size:14px;}
.card{background:white;border-radius:8px;padding:10px;margin:6px 0;display:flex;justify-content:space-between;}
.qty input{width:60px;text-align:center;}
button{padding:7px;border:none;border-radius:6px;background:#222;color:white;margin:3px;cursor:pointer;}
input,select{margin:3px 0;padding:6px;width:100%;}
#listaClientes div{padding:6px;background:white;margin:3px 0;cursor:pointer;border-radius:5px;}
#listaClientes div:hover{background:#ddd;}
#clienteSelecionadoBox{background:#dff0d8;padding:8px;border-radius:5px;margin:5px 0;display:none;}
@media(max-width:900px){
.container{flex-direction:column;}
.catalogo{padding-bottom:260px;}
.pedido{position:fixed;bottom:0;height:240px;width:100%;}
}
</style>
</head>

<body>

<header><b>BS Box - Conecta Varejo</b></header>

<div class="container">

<div class="catalogo">

<input id="buscaCliente" placeholder="Buscar cliente">
<div id="clienteSelecionadoBox"></div>
<div id="listaClientes"></div>

<hr>

<input id="busca" placeholder="Buscar produto">
<select id="filtroCategoria"></select>
<select id="filtroFornecedor"></select>

<div id="lista"></div>

</div>

<div class="pedido">
<h3 id="pedidoNumero"></h3>
<div id="pedido" class="pedidoItens"></div>
<div id="totalPedido"></div>
<button onclick="salvarPedidoFirebase()">Salvar Pedido</button>
</div>

</div>

<script>

/* VARIAVEIS */
let produtos=[]
let pedido={}
let numeroPedido=Date.now()
let clienteSelecionado=null
let clienteNome=""
let clientesCache=[]
let db

/* INIT */
document.addEventListener("DOMContentLoaded", function(){

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "bs-box-pedidos.firebaseapp.com",
projectId: "bs-box-pedidos"
}

firebase.initializeApp(firebaseConfig)
db = firebase.firestore()

document.getElementById("pedidoNumero").innerText = "Pedido " + numeroPedido

carregarCatalogo()

document.getElementById("busca").addEventListener("input", render)
document.getElementById("filtroCategoria").addEventListener("change", render)
document.getElementById("filtroFornecedor").addEventListener("change", render)

})

/* CATALOGO */
function carregarCatalogo(){
fetch("base_de_produtos.xlsx")
.then(r=>r.arrayBuffer())
.then(data=>{
const wb=XLSX.read(data,{type:'array'})
const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1})

produtos=[]
json.slice(1).forEach(l=>{
produtos.push({
codigo:l[0],
categoria:l[1],
descricao:l[2],
fornecedor:l[3],
valorUnit:l[4],
pedidoMin:l[6]||1
})
})

popularFiltros()
render()
})
}

function popularFiltros(){
let cat=document.getElementById("filtroCategoria")
let forn=document.getElementById("filtroFornecedor")

cat.innerHTML='<option value="">Todas</option>'
forn.innerHTML='<option value="">Todos</option>'

;[...new Set(produtos.map(p=>p.categoria))].forEach(c=>cat.innerHTML+=`<option>${c}</option>`)
;[...new Set(produtos.map(p=>p.fornecedor))].forEach(f=>forn.innerHTML+=`<option>${f}</option>`)
}

/* RENDER */
function render(){

let busca=document.getElementById("busca").value.toLowerCase()
let categoria=document.getElementById("filtroCategoria").value
let fornecedor=document.getElementById("filtroFornecedor").value

let lista=document.getElementById("lista")
lista.innerHTML=""

produtos.filter(p=>{
return p.descricao.toLowerCase().includes(busca)
&& (!categoria || p.categoria==categoria)
&& (!fornecedor || p.fornecedor==fornecedor)
})
.forEach(p=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`
<div>
<b>${p.descricao}</b><br>
R$ ${p.valorUnit}<br>
Min: ${p.pedidoMin}
</div>
<div class="qty">
<input type="number" id="q_${p.codigo}">
<button onclick="addItem('${p.codigo}')">Add</button>
</div>`

lista.appendChild(div)
})

renderPedido()
}

/* PEDIDO */
function addItem(c){
let q=parseInt(document.getElementById("q_"+c).value)
let prod=produtos.find(p=>p.codigo==c)

if(!q || q<prod.pedidoMin){
alert("Pedido mínimo "+prod.pedidoMin)
return
}

pedido[c]={...prod,qtd:q}
render()
}

function renderPedido(){
let box=document.getElementById("pedido")
box.innerHTML=""
let total=0

Object.values(pedido).forEach(p=>{
let st=p.qtd*p.valorUnit
total+=st

box.innerHTML+=`
${p.descricao} - ${p.qtd}x 
<input value="${p.valorUnit}" onchange="alterarValor('${p.codigo}',this.value)">
= ${st.toFixed(2)}
<button onclick="removerItem('${p.codigo}')">X</button><br>`
})

document.getElementById("totalPedido").innerText="Total "+total.toFixed(2)
}

function alterarValor(c,v){
pedido[c].valorUnit=parseFloat(v)
renderPedido()
}

function removerItem(c){
delete pedido[c]
render()
}

/* FIREBASE */
function salvarPedidoFirebase(){
if(!clienteSelecionado) return alert("Selecione um cliente")

db.collection("pedidos").add({
cliente:clienteNome,
clienteId:clienteSelecionado,
numero:numeroPedido,
data:new Date(),
itens:Object.values(pedido),
total:Object.values(pedido).reduce((s,p)=>s+(p.qtd*p.valorUnit),0)
}).then(()=>{
alert("Pedido salvo")
pedido={}
render()
})
}

</script>

</body>
</html>
