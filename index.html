<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS Box - Conecta Varejo</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCmbM5EmPunEHTUZYsnNtPJykUMvcQ3Yls",
  authDomain: "bs-box-pedidos.firebaseapp.com",
  projectId: "bs-box-pedidos",
  storageBucket: "bs-box-pedidos.firebasestorage.app",
  messagingSenderId: "889764433720",
  appId: "1:889764433720:web:3e8df9469aa1d32773bbcd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
header{background:white;padding:10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #ddd;}
header img{height:45px;}
.container{display:flex;height:calc(100vh - 70px);}
.catalogo{flex:2;overflow:auto;padding:10px;}
.pedido{flex:1;background:white;border-left:1px solid #ddd;padding:10px;display:flex;flex-direction:column;}
.pedidoItens{flex:1;overflow:auto;font-size:14px;margin-bottom:10px;}
textarea{width:100%;min-height:60px;}
.card{background:white;border-radius:8px;padding:10px;margin:6px 0;display:flex;justify-content:space-between;gap:10px;}
.qty{display:flex;flex-direction:column;gap:5px;}
.qty input{width:60px;text-align:center;}
button{padding:7px;border:none;border-radius:6px;background:#222;color:white;margin:3px;cursor:pointer;flex:1;}
.botoes{display:flex;gap:5px;}
.total{font-weight:bold;font-size:17px;}
</style>
</head>

<body>

<header>
<img src="logo_conecta.png">
<div><b>Conecta Varejo</b><br>Sistema de Pedidos</div>
</header>

<div class="container">

<div class="catalogo">
<h2>Catálogo</h2>

<button onclick="carregarCatalogo()">Atualizar catálogo</button>

<!-- 🔥 BLOCO CLIENTE COMPLETO -->
<br><br>

<input id="cliente" placeholder="Razão social">

<br><br>

<input id="nomeFantasia" placeholder="Nome fantasia">

<br><br>

<input id="cnpj" placeholder="CNPJ (somente números)">
<button onclick="buscarCNPJ()">Buscar CNPJ</button>

<br><br>

<input id="endereco" placeholder="Endereço">

<br><br>

<input id="ie" placeholder="Inscrição Estadual">

<br><br>

<input id="contato" placeholder="Nome do contato">

<br><br>

<input id="telefone" placeholder="Telefone">

<br><br>

<button onclick="salvarClienteFirebase()">Salvar Cliente</button>

<br><br>

<input id="busca" placeholder="Buscar produto ou código" oninput="render()">

<br><br>

<select id="filtroCategoria" onchange="render()"></select>
<select id="filtroFornecedor" onchange="render()"></select>

<div id="lista"></div>
</div>

<div class="pedido">
<h3 id="pedidoNumero"></h3>
<div class="pedidoItens" id="pedido"></div>
<div class="total" id="totalPedido"></div>
<textarea id="observacao" placeholder="Observações"></textarea>

<div class="botoes">
<button onclick="novoPedido()">Novo</button>
<button onclick="gerarPDF()">PDF</button>
<button onclick="gerarExcel()">Excel</button>
<button onclick="salvarPedidoFirebase()">Salvar Pedido</button>
</div>
</div>

</div>

<div id="pdfTemplate" style="display:none"></div>

<script>

let produtos=[]
let pedido={}
let numeroPedido=gerarNumeroPedido()

document.getElementById("pedidoNumero").innerText="Pedido "+numeroPedido

function gerarNumeroPedido(){
let d=new Date()
return d.getFullYear()+("0"+(d.getMonth()+1)).slice(-2)+("0"+d.getDate()).slice(-2)+"-"+("0"+d.getHours()).slice(-2)+("0"+d.getMinutes()).slice(-2)
}

function normalizar(t){return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}

carregarCatalogo()

function carregarCatalogo(){
fetch("base_de_produtos.xlsx?"+Date.now())
.then(r=>r.arrayBuffer())
.then(data=>{
const workbook=XLSX.read(data,{type:'array'})
const sheet=workbook.Sheets[workbook.SheetNames[0]]
const json=XLSX.utils.sheet_to_json(sheet,{header:1})

produtos=[]
json.slice(1).forEach(l=>{
if(!l[0]) return
produtos.push({
codigo:String(l[0]),
categoria:l[1],
descricao:l[2],
fornecedor:l[3],
valorUnit:parseFloat(l[4])||0,
pedidoMin:parseInt(l[6])||1
})
})

popularFiltros();render()
})}

function popularFiltros(){
let categorias=[...new Set(produtos.map(p=>p.categoria))]
let fornecedores=[...new Set(produtos.map(p=>p.fornecedor))]
let cat=document.getElementById("filtroCategoria")
let forn=document.getElementById("filtroFornecedor")

cat.innerHTML='<option value="">Todas categorias</option>'
forn.innerHTML='<option value="">Todos fornecedores</option>'

categorias.forEach(c=>cat.innerHTML+=`<option value="${c}">${c}</option>`)
fornecedores.forEach(f=>forn.innerHTML+=`<option value="${f}">${f}</option>`)
}

function render(){
let busca=normalizar(document.getElementById("busca").value)
let categoria=document.getElementById("filtroCategoria").value
let fornecedor=document.getElementById("filtroFornecedor").value
let lista=document.getElementById("lista")

lista.innerHTML=""

produtos.filter(p=>{
let okBusca=normalizar(p.descricao+p.codigo).includes(busca)
let okCat=!categoria||p.categoria==categoria
let okFor=!fornecedor||p.fornecedor==fornecedor
return okBusca&&okCat&&okFor
}).forEach(p=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`
<div>
<b>${p.descricao}</b><br>
Cod: ${p.codigo}<br>
R$ ${p.valorUnit.toFixed(2)}<br>
<small>Min: ${p.pedidoMin}</small>
</div>
<div class="qty">
<input type="number" min="1" placeholder="Qtd" id="q_${p.codigo}">
<button onclick="addItem('${p.codigo}')">Add</button>
</div>`

lista.appendChild(div)
})

renderPedido()
}

function addItem(c){
let input=document.getElementById("q_"+c)
let q=parseInt(input.value)
let prod=produtos.find(p=>p.codigo==c)

if(!q || q < prod.pedidoMin){
alert("Pedido mínimo: "+prod.pedidoMin)
return
}

pedido[c]={codigo:c,produto:prod.descricao,qtd:q,valor:prod.valorUnit,fornecedor:prod.fornecedor}

input.value=""
render()
}

function renderPedido(){
let box=document.getElementById("pedido")
box.innerHTML=""

let total=0

Object.values(pedido).forEach(p=>{
let st=p.qtd*p.valor
total+=st

box.innerHTML+=`
${p.codigo} - ${p.qtd}x - R$ ${st.toFixed(2)}
<button onclick="removerItem('${p.codigo}')">❌</button><br>`
})

document.getElementById("totalPedido").innerText="Total R$ "+total.toFixed(2)
}

function removerItem(c){
delete pedido[c]
render()
}

/* 🔥 BUSCAR CNPJ COMPLETO */
async function buscarCNPJ(){

let cnpj = document.getElementById("cnpj").value.replace(/\D/g,'')

if(cnpj.length !== 14){
alert("CNPJ inválido")
return
}

try{
let res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`)
let data = await res.json()

document.getElementById("cliente").value = data.razao_social || ""
document.getElementById("nomeFantasia").value = data.nome_fantasia || ""
document.getElementById("endereco").value =
(data.logradouro || "") + ", " + (data.numero || "") + " - " + (data.municipio || "")

alert("CNPJ carregado - confira os dados")

}catch(e){
alert("Erro ao buscar CNPJ")
console.error(e)
}

}

/* 🔥 SALVAR CLIENTE COMPLETO */
function salvarClienteFirebase(){

let cliente = {
nome: document.getElementById("cliente").value,
nomeFantasia: document.getElementById("nomeFantasia").value,
cnpj: document.getElementById("cnpj").value.replace(/\D/g,''),
endereco: document.getElementById("endereco").value,
inscricaoEstadual: document.getElementById("ie").value,
contato: document.getElementById("contato").value,
telefone: document.getElementById("telefone").value,
dataCadastro: new Date()
}

if(!cliente.nome){
alert("Nome do cliente obrigatório")
return
}

db.collection("clientes").add(cliente)
.then(()=>{
alert("Cliente salvo com sucesso 🚀")
})
.catch((e)=>{
console.error(e)
alert("Erro ao salvar cliente")
})

}

/* 🔥 SALVAR PEDIDO */
function salvarPedidoFirebase(){

let cliente = document.getElementById("cliente").value

let dadosPedido = {
cliente: cliente,
numero: numeroPedido,
data: new Date(),
itens: Object.values(pedido),
total: Object.values(pedido).reduce((t,p)=>t+(p.qtd*p.valor),0),
observacao: document.getElementById("observacao").value
}

db.collection("pedidos").add(dadosPedido)
.then(()=>{
alert("Pedido salvo no Firebase 🚀")
})
.catch((e)=>{
console.error(e)
alert("Erro ao salvar")
})

}

function novoPedido(){
pedido={}
numeroPedido=gerarNumeroPedido()
document.getElementById("pedidoNumero").innerText="Pedido "+numeroPedido
document.getElementById("observacao").value=""
render()
}

</script>
</body>
</html>
