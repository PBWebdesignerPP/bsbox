<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BS Box - Conecta Varejo</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:white;
padding:10px;
display:flex;
align-items:center;
gap:10px;
border-bottom:1px solid #ddd;
}

header img{
height:45px;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

.catalogo{
flex:2;
overflow:auto;
padding:10px;
}

.pedido{
flex:1;
background:white;
border-left:1px solid #ddd;
padding:10px;
display:flex;
flex-direction:column;
}

input,select,textarea{
padding:8px;
font-size:14px;
width:100%;
margin:4px 0;
}

button{
padding:8px;
border:none;
border-radius:6px;
background:#222;
color:white;
cursor:pointer;
margin:3px 0;
}

.card{
background:white;
border-radius:8px;
padding:10px;
margin:6px 0;
display:flex;
justify-content:space-between;
}

.qty{
display:flex;
gap:5px;
}

.qty button{
width:28px;
height:28px;
}

.qty input{
width:45px;
text-align:center;
}

.total{
font-weight:bold;
font-size:18px;
margin-top:10px;
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.pedido{
position:fixed;
bottom:0;
left:0;
right:0;
height:40%;
}

.catalogo{
padding-bottom:45%;
}

}

</style>
</head>

<body>

<header>

<img src="logo_conecta.png">

<div>
<b>Conecta Varejo</b><br>
Presidente Prudente
</div>

</header>

<div class="container">

<div class="catalogo">

<h2>Catálogo</h2>

<input type="file" id="fileInput">

<input id="cliente" placeholder="Nome do cliente">

<input id="busca" placeholder="Buscar..." oninput="render()">

<select id="filtroCategoria" onchange="render()">
<option value="">Todas categorias</option>
</select>

<select id="filtroFornecedor" onchange="render()">
<option value="">Todos fornecedores</option>
</select>

<div id="lista"></div>

</div>

<div class="pedido">

<h3 id="pedidoNumero"></h3>

<div id="pedido"></div>

<div class="total" id="totalPedido"></div>

<textarea id="observacao" placeholder="Observações"></textarea>

<button onclick="novoPedido()">Novo pedido</button>
<button onclick="gerarPDF()">Gerar PDF</button>
<button onclick="gerarExcel()">Gerar Excel</button>

</div>

</div>

<script>

let produtos=[]
let pedido={}

let numeroPedido=gerarNumeroPedido()

document.getElementById("pedidoNumero").innerText="Pedido Nº "+numeroPedido

function gerarNumeroPedido(){

let d=new Date()

return d.getFullYear()+
("0"+(d.getMonth()+1)).slice(-2)+
("0"+d.getDate()).slice(-2)+"-"+
("0"+d.getHours()).slice(-2)+
("0"+d.getMinutes()).slice(-2)

}

function normalizar(txt){
return txt.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
}

document.getElementById("fileInput").addEventListener("change",function(e){

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(evt){

const workbook=XLSX.read(evt.target.result,{type:'array'})
const sheet=workbook.Sheets[workbook.SheetNames[0]]
const json=XLSX.utils.sheet_to_json(sheet,{header:1})

produtos=[]

json.slice(1).forEach(l=>{

if(!l[0]) return

produtos.push({

codigo:String(l[0]),
categoria:l[1],
descricao:l[2],
fornecedor:l[3],
valorUnit:parseFloat(l[4])||0

})

})

popularFiltros()
render()

}

reader.readAsArrayBuffer(file)

})

function popularFiltros(){

let catSet=new Set()
let fornSet=new Set()

produtos.forEach(p=>{

catSet.add(p.categoria)
fornSet.add(p.fornecedor)

})

let cat=document.getElementById("filtroCategoria")
let forn=document.getElementById("filtroFornecedor")

cat.innerHTML='<option value="">Todas categorias</option>'
forn.innerHTML='<option value="">Todos fornecedores</option>'

catSet.forEach(c=>cat.innerHTML+=`<option>${c}</option>`)
fornSet.forEach(f=>forn.innerHTML+=`<option>${f}</option>`)

}

function render(){

let busca=normalizar(document.getElementById("busca").value)

let cat=document.getElementById("filtroCategoria").value
let forn=document.getElementById("filtroFornecedor").value

let lista=document.getElementById("lista")

lista.innerHTML=""

produtos
.filter(p=>{

let txt=normalizar(p.descricao+p.codigo+p.fornecedor+p.categoria)

return txt.includes(busca)

})
.filter(p=>!cat || p.categoria==cat)
.filter(p=>!forn || p.fornecedor==forn)

.forEach(p=>{

let q=pedido[p.codigo]?.qtd||0

let div=document.createElement("div")

div.className="card"

div.innerHTML=`

<div>

<b>${p.descricao}</b><br>
Cod: ${p.codigo}<br>
Fornecedor: ${p.fornecedor}<br>
R$ ${p.valorUnit.toFixed(2)}

</div>

<div class="qty">

<button onclick="menos('${p.codigo}')">-</button>

<input type="number" value="${q}" onchange="setQtd('${p.codigo}',this.value)">

<button onclick="mais('${p.codigo}')">+</button>

</div>

`

lista.appendChild(div)

})

renderPedido()

}

function setQtd(c,q){

q=parseInt(q)

let prod=produtos.find(p=>p.codigo==c)

if(!q || q<=0){

delete pedido[c]

}else{

pedido[c]={

produto:prod.descricao,
qtd:q,
valor:prod.valorUnit,
fornecedor:prod.fornecedor

}

}

render()

}

function mais(c){

let prod=produtos.find(p=>p.codigo==c)

if(!pedido[c]){

pedido[c]={produto:prod.descricao,qtd:1,valor:prod.valorUnit,fornecedor:prod.fornecedor}

}else{

pedido[c].qtd++

}

render()

}

function menos(c){

if(!pedido[c]) return

pedido[c].qtd--

if(pedido[c].qtd<=0) delete pedido[c]

render()

}

function renderPedido(){

let box=document.getElementById("pedido")

box.innerHTML=""

let total=0

Object.keys(pedido).forEach(c=>{

let p=pedido[c]

let sub=p.qtd*p.valor

box.innerHTML+=`${p.qtd}x ${p.produto} - R$ ${sub.toFixed(2)}<br>`

total+=sub

})

document.getElementById("totalPedido").innerText="Total R$ "+total.toFixed(2)

}

function novoPedido(){

pedido={}

numeroPedido=gerarNumeroPedido()

document.getElementById("pedidoNumero").innerText="Pedido Nº "+numeroPedido

document.getElementById("observacao").value=""

render()

}

function gerarPDF(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

doc.setFontSize(10)

let y=10

doc.text("CONECTA VAREJO PRESIDENTE PRUDENTE",10,y)
y+=6
doc.text("Rua Tomizo Kawagutti - 259 Vila Industrial",10,y)
y+=6
doc.text("Contato: 18 9617 0377",10,y)

y+=10

doc.text("Pedido Nº: "+numeroPedido,10,y)
y+=6
doc.text("Data: "+new Date().toLocaleDateString(),10,y)
y+=6

let cliente=document.getElementById("cliente").value||"SEM CLIENTE"

doc.text("Cliente: "+cliente,10,y)

y+=10

let total=0

let fornecedores={}

Object.keys(pedido).forEach(c=>{

let p=pedido[c]

if(!fornecedores[p.fornecedor]) fornecedores[p.fornecedor]=[]

fornecedores[p.fornecedor].push({codigo:c,...p})

})

Object.keys(fornecedores).forEach(f=>{

doc.text("Fornecedor: "+f,10,y)

y+=6

let subtotal=0

fornecedores[f].forEach(i=>{

let sub=i.qtd*i.valor

let linha=`${i.codigo} ${i.produto}`

let linhas=doc.splitTextToSize(linha,120)

doc.text(linhas,10,y)

doc.text(String(i.qtd),140,y)

doc.text(i.valor.toFixed(2),155,y)

doc.text(sub.toFixed(2),180,y)

y+=6

subtotal+=sub

})

doc.text("Subtotal fornecedor: "+subtotal.toFixed(2),140,y)

y+=10

total+=subtotal

})

doc.text("TOTAL DO PEDIDO: "+total.toFixed(2),140,y)

y+=10

let obs=document.getElementById("observacao").value

if(obs){

doc.text("Observações:",10,y)

y+=6

let linhas=doc.splitTextToSize(obs,180)

doc.text(linhas,10,y)

}

doc.save("pedido_"+numeroPedido+".pdf")

}

function gerarExcel(){

let rows=[["Fornecedor","Codigo","Produto","Qtd","Unit","Subtotal"]]

Object.keys(pedido).forEach(c=>{

let p=pedido[c]

let sub=p.qtd*p.valor

rows.push([p.fornecedor,c,p.produto,p.qtd,p.valor,sub])

})

let ws=XLSX.utils.aoa_to_sheet(rows)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Pedido")

XLSX.writeFile(wb,"pedido_"+numeroPedido+".xlsx")

}

</script>

</body>
</html>
